version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "443:443"
      - "8084:8084"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - emqx

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      INFLUX_URL: ${INFLUX_URL}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      INFLUX_BUCKET_AGGREGATED: ${INFLUX_BUCKET_AGGREGATED}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      MQTT_TOKEN_EXPIRES_IN: ${MQTT_TOKEN_EXPIRES_IN}
      MQTT_BROKER_INTERNAL: ${MQTT_BROKER_INTERNAL}
      ML_SERVICE_URL: ${ML_SERVICE_URL}
      API_PORT: "3001"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - influxdb
      - redis
      - emqx

  ml:
    build:
      context: ./apps/ml
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      INFLUX_URL: ${INFLUX_URL}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      INFLUX_BUCKET_AGGREGATED: ${INFLUX_BUCKET_AGGREGATED}
      REDIS_URL: ${REDIS_URL}
      MQTT_BROKER_HOST: emqx
      MQTT_BROKER_PORT: "1883"
      ML_MQTT_USERNAME: ${ML_MQTT_USERNAME}
      ML_MQTT_PASSWORD: ${ML_MQTT_PASSWORD}
      ML_SERVICE_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - influxdb
      - redis
      - emqx

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_MQTT_URL: ${NEXT_PUBLIC_MQTT_URL}
    ports:
      - "3000:3000"
    depends_on:
      - api

  emqx:
    image: emqx:5
    ports:
      - "1883:1883"
      - "8083:8083"
    volumes:
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - emqx_data:/opt/emqx/data
    environment:
      EMQX_NODE__NAME: emqx@127.0.0.1
      EMQX_NODE__COOKIE: fitsense-emqx-cookie

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: fitsense
      DOCKER_INFLUXDB_INIT_BUCKET: heartrate
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fitsense
      POSTGRES_USER: fitsense
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb
      - postgres

volumes:
  influxdb_data:
  postgres_data:
  redis_data:
  emqx_data:
  grafana_data:
