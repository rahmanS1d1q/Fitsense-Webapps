events {
    worker_connections 1024;
}

http {
    # ─── Fase Awal: HTTP tanpa SSL ─────────────────────────────────────────────
    # Gunakan konfigurasi ini saat testing via IP VPS sebelum domain & SSL siap.
    # Setelah SSL siap, ganti ke blok HTTPS di bawah (lihat komentar).

    server {
        listen 80;
        server_name _;

        # ── Next.js Web Dashboard ─────────────────────────────────────────────
        location / {
            proxy_pass http://web:3000;
            proxy_http_version 1.1;

            # Header standar reverse proxy
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Next.js HMR / dev, opsional di prod tapi tidak merusak)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 60s;
        }

        # ── Express REST API ──────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://api:3001;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
        }

        # ── Static file uploads dari API ──────────────────────────────────────
        location /uploads/ {
            proxy_pass http://api:3001;
            proxy_set_header Host $host;
        }
    }

    # ─── Fase Production: HTTPS dengan SSL ─────────────────────────────────────
    # Aktifkan blok ini setelah domain dan sertifikat SSL tersedia.
    # Jalankan: certbot certonly --standalone -d yourdomain.com
    # Kemudian uncomment blok di bawah dan comment blok HTTP di atas.
    #
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/live/yourdomain.com/privkey.pem;
    #
    #     location / {
    #         proxy_pass http://web:3000;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_set_header Upgrade    $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #     }
    #
    #     location /api/ {
    #         proxy_pass http://api:3001;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
    #
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
}

# ─── MQTT WebSocket ────────────────────────────────────────────────────────────
# Fase awal (tanpa SSL): Browser/device konek ke ws://VPS_IP:8084
# Fase production (SSL): Ganti listen ke `8084 ssl` dan tambahkan ssl_certificate
stream {
    server {
        listen 8084;
        proxy_pass emqx:8083;
    }

    # ─── MQTT WSS (SSL) — aktifkan setelah SSL tersedia ──────────────────────
    # server {
    #     listen 8084 ssl;
    #     ssl_certificate     /etc/nginx/ssl/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/live/yourdomain.com/privkey.pem;
    #     proxy_pass emqx:8083;
    # }
}
