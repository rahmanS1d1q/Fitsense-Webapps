## EMQX 5 Configuration — FitSense Platform
## Requirements: 6.1, 6.2, 6.3

## Node
node.name = emqx@127.0.0.1

## Listeners
## TCP internal (API Server + ML Service)
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 10000
}

## WebSocket internal (Web Dashboard via NGINX)
listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 10000
}

## MQTT over TLS (Mobile App — direct connection)
listeners.ssl.default {
  bind = "0.0.0.0:8883"
  max_connections = 10000
  ssl_options {
    certfile = "/opt/emqx/etc/certs/cert.pem"
    keyfile  = "/opt/emqx/etc/certs/key.pem"
  }
}

## Authentication — webhook to API Server
authentication = [
  {
    mechanism = password_based
    backend = http
    method = post
    url = "http://api:3001/api/mqtt/auth"
    headers { "Content-Type" = "application/json" }
    body { clientid = "${clientid}", username = "${username}", password = "${password}" }
    pool_size = 8
    connect_timeout = 5s
    request_timeout = 5s
  }
]

## Disable anonymous access
allow_anonymous = false

## Authorization (ACL) — webhook to API Server
authorization {
  no_match = deny
  deny_action = disconnect
  sources = [
    {
      type = http
      method = post
      url = "http://api:3001/api/mqtt/acl"
      headers { "Content-Type" = "application/json" }
      body {
        clientid = "${clientid}"
        username = "${username}"
        topic    = "${topic}"
        action   = "${action}"
      }
      pool_size = 8
      connect_timeout = 5s
      request_timeout = 5s
    }
  ]
}

## ML Service credentials (must match ML_MQTT_USERNAME / ML_MQTT_PASSWORD env vars)
## These are configured via environment variables in docker-compose.yml
