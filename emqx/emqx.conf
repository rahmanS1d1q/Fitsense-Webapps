## EMQX 5 Configuration — FitSense Platform
## Requirements: 6.1, 6.2, 6.3

node {
  name = "emqx@127.0.0.1"
  cookie = "fitsense-emqx-cookie"
  data_dir = "/opt/emqx/data"
}

cluster {
  name = fitsense
  discovery_strategy = manual
}

dashboard {
  listeners.http {
    bind = 18083
  }
}

listeners {
  tcp.default {
    bind = "0.0.0.0:1883"
    max_connections = 10000
  }

  ws.default {
    bind = "0.0.0.0:8083"
    max_connections = 10000
  }
}

## Disable anonymous access
mqtt {
  max_clientid_len = 65535
}

allow_anonymous = false

## Authentication — webhook to API Server
authentication = [
  {
    mechanism = password_based
    backend = http
    method = post
    url = "http://host.docker.internal:3001/api/mqtt/auth"
    headers {
      "Content-Type" = "application/json"
    }
    body {
      clientid = "${clientid}"
      username = "${username}"
      password = "${password}"
    }
    pool_size = 8
    connect_timeout = 5s
    request_timeout = 5s
    enable_pipelining = 100
  }
]

## Authorization (ACL) — webhook to API Server
authorization {
  no_match = deny
  deny_action = disconnect
  cache {
    enable = false
  }
  sources = [
    {
      type = http
      enable = true
      method = post
      url = "http://host.docker.internal:3001/api/mqtt/acl"
      headers {
        "Content-Type" = "application/json"
      }
      body {
        clientid = "${clientid}"
        username = "${username}"
        topic    = "${topic}"
        action   = "${action}"
      }
      pool_size = 8
      connect_timeout = 5s
      request_timeout = 5s
    }
  ]
}
